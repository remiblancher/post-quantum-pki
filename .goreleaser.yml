# GoReleaser configuration for Qpki
# Documentation: https://goreleaser.com

version: 2

project_name: qpki

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: qpki
    main: ./cmd/qpki
    binary: qpki
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

# Universal binary for macOS (combines amd64 + arm64)
universal_binaries:
  - id: qpki-universal
    ids:
      - qpki
    name_template: "qpki"
    replace: false

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

signs:
  - artifacts: checksum
    cmd: gpg
    args:
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

changelog:
  sort: asc
  groups:
    - title: "## ✨ Features"
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: "## 🐛 Fixes"
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: "## 🧪 Testing"
      regexp: '^.*?test(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: "## 📚 Documentation"
      regexp: '^.*?docs(\([[:word:]]+\))??!?:.+$'
      order: 3
    - title: "## 🔧 Other"
      order: 999
  filters:
    exclude:
      - "^ci:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: qpki
    name: qpki
  draft: true  # Creates draft for review before publishing
  prerelease: auto
  name_template: "qpki v{{.Version}}"

# Linux packages (.deb, .rpm)
nfpms:
  - id: packages
    package_name: qpki
    vendor: Remi Blancher
    homepage: "https://github.com/qpki/qpki"
    maintainer: "Remi Blancher"
    description: "Qpki - Certificate Authority toolkit supporting classical and Post-Quantum Cryptography (PQC)"
    license: "Apache-2.0"
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    section: utils
    priority: optional

# Homebrew tap (macOS)
brews:
  - repository:
      owner: qpki
      name: homebrew-qpki
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/qpki/qpki"
    description: "Qpki - Certificate Authority toolkit with PQC support"
    license: "Apache-2.0"
    install: |
      bin.install "qpki"
    test: |
      system "#{bin}/qpki", "--version"
